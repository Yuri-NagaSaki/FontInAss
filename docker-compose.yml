services:
  fontinass:
    build: .
    container_name: fontinass-local
    restart: unless-stopped
    ports:
      - "127.0.0.1:3300:3000"
    volumes:
      # Mount your font directory here (fonts go in ./fonts on host)
      - ./fonts:/app/fonts
      # Persist the SQLite database
      - ./data:/app/data
    environment:
      - PORT=3000
      - FONT_DIR=/app/fonts
      - DB_PATH=/app/data/fonts.db
      - API_KEY=${API_KEY:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - SUBSET_CONCURRENCY=${SUBSET_CONCURRENCY:-5}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - SHARING_MAX_FILE_SIZE=${SHARING_MAX_FILE_SIZE:-209715200}
      - SHARING_RATE_LIMIT=${SHARING_RATE_LIMIT:-3}
      - SHARING_CACHE_TTL=${SHARING_CACHE_TTL:-300}
      - PENDING_DIR=/app/data/pending
